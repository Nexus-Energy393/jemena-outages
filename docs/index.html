  if (client.notes) body += `<div style="margin-top:6px;font-size:12px">${esc(client.notes)}</div>`;
  if (affected) {
    const tH = (affected.total_hours||0).toFixed(1);
    const lH = (affected.longest_hours||0).toFixed(1);
    body += `<h4>Outage exposure</h4>
      <div style="font-size:12px">Longest single: <strong>${lH}h</strong> · Total across all: <strong>${tH}h</strong></div>`;
    if (affected.definite.length) {
      body += `<h4><span class="chip definite">Definitely affected</span></h4>`;
      body += affected.definite.map(o =>
        `<div class="outage">${esc(o.start)} – ${esc(o.end)} (${(o.duration_hours||0).toFixed(1)}h) · ${esc(o.street)} ${esc(o.suburb)}${o.status==='Cancelled'?' <span class="chip cancelled">cancelled</span>':''}</div>`
      ).join('');
    }
    if (affected.possible.length) {
      body += `<h4><span class="chip possible">Possibly affected</span> <span style="font-weight:normal;color:#666">(within ${DATA.meta.bufferMetres}m)</span></h4>`;
      body += affected.possible.map(o =>
        `<div class="outage">${esc(o.start)} – ${esc(o.end)} (${(o.duration_hours||0).toFixed(1)}h) · ${esc(o.street)} ${esc(o.suburb)} <span style="color:#999">(${o._distance_m||'?'}m)</span></div>`
      ).join('');
    }
    // Action buttons
    const cid = client.client_id || '';
    const pdDomain = (DATA.meta && DATA.meta.pipedriveDomain) || 'nexusenergy';
    const leadId = client.pipedrive_lead_id || '';
    const pipedriveUrl = leadId
      ? `https://${pdDomain}.pipedrive.com/leads/inbox/${leadId}`
      : `https://${pdDomain}.pipedrive.com/leads/inbox`;
    body += `<div class="popup-actions">`;
    if (cid) {
      body += `<a class="btn-secondary" href="affected.html#client-${esc(cid)}">View on list</a>`;
    }
    body += `<a class="btn-primary" href="${pipedriveUrl}" target="_blank" rel="noopener">${leadId ? 'Open in Pipedrive' : 'Pipedrive inbox'}</a>`;
    body += `</div>`;
  }
  return `<div>${header}${body}</div>`;
}

const suburbIcon = L.divIcon({ className:'', html:'<div style="width:14px;height:14px;border-radius:50%;background:#1565c0;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.35)"></div>', iconSize:[14,14], iconAnchor:[7,7] });
const suburbIconCancelled = L.divIcon({ className:'', html:'<div style="width:14px;height:14px;border-radius:50%;background:#f9a825;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.35)"></div>', iconSize:[14,14], iconAnchor:[7,7] });

function clientIcon(state) {
  // state: 'definite' | 'possible' | 'unaffected'
  const colors = { definite: '#b71c1c', possible: '#fb8c00', unaffected: '#546e7a' };
  const size = state === 'unaffected' ? 8 : 12;
  return L.divIcon({ className:'', html:`<div style="width:${size}px;height:${size}px;background:${colors[state]};border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4); transform: rotate(45deg);"></div>`, iconSize:[size+4,size+4], iconAnchor:[(size+4)/2,(size+4)/2] });
}

// Jemena street shading — kept as a faint underlay for street-level context
// inside the zones; the tight de-energisation polygons (below) are the primary
// visual now, so this no longer needs to shout.
const streetLayer = L.layerGroup();
for (const s of DATA.streets) {
  L.polyline(s.coords, {
    color: s.cancelled ? '#9e9e9e' : '#ef9a9a',
    weight: 4, opacity: 0.5, lineJoin: 'round', lineCap: 'round',
  }).bindPopup(buildStreetPopup(s.suburb, s.name, s.outages))
    .addTo(streetLayer);
}
streetLayer.addTo(map);

// Per-network colour scheme for the outage-zone polygons.
const NETWORK_STYLE = {
  'Jemena':        { stroke: '#1a7f4b', fill: '#4caf6a' },
  'Ausnet':        { stroke: '#5e35b1', fill: '#9575cd' },
  'CitiPower':     { stroke: '#e65100', fill: '#ffb74d' },
  'Powercor':      { stroke: '#bf360c', fill: '#ff8a65' },
  'United Energy': { stroke: '#0277bd', fill: '#4fc3f7' },
};
function netStyle(n) { return NETWORK_STYLE[n] || { stroke: '#5e35b1', fill: '#9575cd' }; }

// Outage zones — every network's real de-energisation polygon, colour-coded.
const ausnetLayer = L.layerGroup();
function buildAusnetPopup(ao) {
  const net = ao.network || 'Ausnet';
  const where = [ao.street, ao.suburb].filter(Boolean).join(' · ');
  const cust = ao.customers ? `<div style="font-size:12px;color:#666">${esc(String(ao.customers))} customers impacted</div>` : '';
  const cancelled = ao.status === 'Cancelled' ? ' <span class="chip cancelled">cancelled</span>' : '';
  let body = `<div>
    <h3>${esc(net)} outage zone</h3>
    ${where ? `<div style="font-size:12px;color:#444;margin-bottom:2px">${esc(where)}</div>` : ''}
    <div style="font-size:11px;color:#888;margin-bottom:4px">${esc(ao.incident_id)}</div>
    ${cust}
    <h4>Window</h4>
    <div class="outage">${esc(ao.start)} – ${esc(ao.end)} <span style="color:#999">${ao.duration_hours!=null?'('+ao.duration_hours.toFixed(1)+'h)':''}</span>${cancelled}</div>`;

  const matched = ao.affected_clients || [];
  if (matched.length > 0) {
    body += `<h4>${matched.length} client${matched.length===1?'':'s'} affected</h4>`;
    // Sort: definite first, then by distance
    const sorted = [...matched].sort((a, b) => {
      if (a.match !== b.match) return a.match === 'definite' ? -1 : 1;
      return (a.distance_m || 0) - (b.distance_m || 0);
    });
    body += sorted.slice(0, 12).map(c => {
      const chip = c.match === 'definite'
        ? '<span class="chip definite">in zone</span>'
        : `<span class="chip possible">${c.distance_m}m</span>`;
      const link = c.client_id
        ? `<a href="?focus=${esc(c.client_id)}" style="color:#0b57d0">${esc(c.name)}</a>`
        : esc(c.name);
      return `<div class="outage">${chip} ${link}${c.suburb ? ' <span style="color:#999">· '+esc(c.suburb)+'</span>' : ''}</div>`;
    }).join('');
    if (sorted.length > 12) {
      body += `<div class="outage" style="color:#999">… and ${sorted.length - 12} more</div>`;
    }
  } else {
    body += `<h4>Prospect — no client here yet</h4>
      <div style="font-size:12px;color:#777">Planned outage with no tracked client inside (or within ${DATA.meta.bufferMetres}m). A potential generator-hire opportunity for sites in this zone.</div>`;
  }

  body += `</div>`;
  return body;
}
// A second, fainter layer for planned outages with NO tracked client inside —
// a prospecting view of where power will be down near sites we don't yet serve.
const prospectLayer = L.layerGroup();
function redrawAusnetLayer() {
  ausnetLayer.clearLayers();
  prospectLayer.clearLayers();
  const maxDays = parseFloat(document.getElementById('max-days-select').value || '21');
  for (const ao of (DATA.ausnet || [])) {
    if (ao.start_iso && daysAhead(ao.start_iso) > maxDays) continue;
    const st = netStyle(ao.network);
    const hasClients = ao.has_clients !== false && (ao.affected_clients || []).length > 0;
    L.polygon(ao.polygon, hasClients ? {
      color: st.stroke, weight: 2, opacity: 0.9,
      fillColor: st.fill, fillOpacity: 0.32,
    } : {
      color: st.stroke, weight: 1, opacity: 0.55,
      fillColor: st.fill, fillOpacity: 0.08, dashArray: '4 3',
    }).bindPopup(buildAusnetPopup(ao), { maxHeight: 380 })
      .addTo(hasClients ? ausnetLayer : prospectLayer);
  }
}
// Initial render happens after the daysAhead helper is defined below.
ausnetLayer.addTo(map);
prospectLayer.addTo(map);

const suburbLayer = L.layerGroup();
DATA.suburbs.forEach(s => {
  L.marker([s.lat, s.lng], { icon: s.cancelled>0 ? suburbIconCancelled : suburbIcon, title: s.name })
   .bindPopup(buildSuburbPopup(s), { maxHeight: 380 }).addTo(suburbLayer);
});
suburbLayer.addTo(map);

// Map clients to their affected entry, if any
const affectedByName = new Map();
for (const a of (DATA.affected || [])) {
  const k = a.client.name + '|' + (a.client.address||'') + '|' + (a.client.lat||'') + ',' + (a.client.lng||'');
  affectedByName.set(k, a);
}

const affectedLayer = L.layerGroup();
const clientLayer = L.layerGroup();
const markersByClientId = new Map();

function clientMeetsThreshold(a, defaultMin) {
  if (!a) return false;
  const min = (a.client && a.client.min_outage_hours != null) ? a.client.min_outage_hours : defaultMin;
  return (a.longest_hours || 0) >= min;
}

function daysAhead(isoString) {
  if (!isoString) return Infinity;
  const dt = new Date(isoString);
  if (isNaN(dt)) return Infinity;
  const now = new Date();
  return (dt - now) / (1000 * 60 * 60 * 24);
}

function affectedSoonestDays(a) {
  // Smallest days_ahead across all (active) outages on this client. Some feeds
  // (United Energy) publish only an estimated restore time, no start — fall
  // back to the end date, and if neither is present treat it as happening now
  // (0) so the client still shows rather than being filtered out.
  if (!a) return Infinity;
  let best = Infinity;
  for (const o of (a.definite || []).concat(a.possible || [])) {
    if (o.status === 'Cancelled') continue;
    let d = daysAhead(o.start_iso);
    if (!isFinite(d)) d = daysAhead(o.end_iso);
    if (!isFinite(d)) d = 0;
    if (d < best) best = d;
  }
  return best;
}

function redrawClientLayers() {
  affectedLayer.clearLayers();
  clientLayer.clearLayers();
  markersByClientId.clear();
  const minSel = parseFloat(document.getElementById('min-hours-select').value);
  const maxDays = parseFloat(document.getElementById('max-days-select').value);
  let visibleAffected = 0, visibleDefinite = 0, visiblePossible = 0;

  for (const c of (DATA.clients || [])) {
    const key = c.name + '|' + (c.address||'') + '|' + (c.lat||'') + ',' + (c.lng||'');
    const a = affectedByName.get(key);
    let state = 'unaffected', layer = clientLayer;
    if (a) {
      // Apply per-client override or page-level filter
      const clientMin = (c.min_outage_hours != null) ? c.min_outage_hours : minSel;
      const soonest = affectedSoonestDays(a);
      if ((a.longest_hours || 0) < clientMin || soonest > maxDays) {
        state = 'unaffected';
        layer = clientLayer;
      } else {
        state = a.definite.length ? 'definite' : 'possible';
        layer = affectedLayer;
        visibleAffected++;
        if (state === 'definite') visibleDefinite++; else visiblePossible++;
      }
    }
    const m = L.marker([c.lat, c.lng], { icon: clientIcon(state), title: c.name })
                .bindPopup(buildClientPopup(c, a), { maxHeight: 380 })
                .addTo(layer);
    if (c.client_id) markersByClientId.set(c.client_id, { marker: m, layer });
  }
  document.getElementById('affected-link').textContent = visibleAffected
    ? `${visibleAffected} affected clients`
    : 'Affected clients (0)';
  return { visibleAffected, visibleDefinite, visiblePossible };
}

// Initial selection from default
const defaultMin = (DATA.meta && DATA.meta.defaultMinHours) || 4;
document.getElementById('min-hours-select').value = String(defaultMin);

redrawClientLayers();
redrawAusnetLayer();
affectedLayer.addTo(map);  // affected on by default

// Honour ?focus=<client-id> in URL - centre map on that pin and open popup
function focusClientFromUrl() {
  const params = new URLSearchParams(location.search);
  const focusId = params.get('focus');
  if (!focusId) return;
  const entry = markersByClientId.get(focusId);
  if (!entry) {
    console.warn('Could not find client', focusId, '- it may not be affected today');
    return;
  }
  // Make sure the layer is on the map so the marker is visible
  if (!map.hasLayer(entry.layer)) entry.layer.addTo(map);
  map.setView(entry.marker.getLatLng(), 16, { animate: true });
  setTimeout(() => entry.marker.openPopup(), 400);
}
focusClientFromUrl();

// Update on threshold change; also pass through to affected.html via querystring
document.getElementById('min-hours-select').addEventListener('change', e => {
  redrawClientLayers();
  redrawAusnetLayer();
  const link = document.getElementById('affected-link');
  link.href = `affected.html?min=${encodeURIComponent(e.target.value)}`;
});

// Update on days-ahead window change
document.getElementById('max-days-select').addEventListener('change', () => {
  redrawClientLayers();
  redrawAusnetLayer();
});

// Initial map bounds — focus on where our clients actually are (suburbs +
// client-bearing outage zones), so distant rural prospect zones don't zoom the
// whole state out. Falls back to all zones if nothing has a client yet.
const allBoundsPoints = [];
DATA.suburbs.forEach(s => allBoundsPoints.push([s.lat, s.lng]));
for (const ao of (DATA.ausnet || [])) {
  if (ao.centroid && (ao.has_clients !== false && (ao.affected_clients||[]).length > 0)) allBoundsPoints.push(ao.centroid);
}
if (!allBoundsPoints.length) {
  for (const ao of (DATA.ausnet || [])) if (ao.centroid) allBoundsPoints.push(ao.centroid);
}
if (allBoundsPoints.length) {
  map.fitBounds(L.latLngBounds(allBoundsPoints).pad(0.1));
}

L.control.layers(null, {
  'Outage zones — our clients affected': ausnetLayer,
  'Outage zones — prospects (no client yet)': prospectLayer,
  'Jemena street shading': streetLayer,
  'Suburb markers': suburbLayer,
  'Affected clients': affectedLayer,
  'All clients (incl. unaffected)': clientLayer,
}, { collapsed: true }).addTo(map);

const legend = L.control({ position:'bottomright' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'info-box');
  const unmapped = DATA.suburbs.reduce((a, s) => a + s.streets.filter(st => !MATCHED.has(s.name.toLowerCase() + '||' + norm(st))).length, 0);
  const zoneSwatch = (c) => `<span style="display:inline-block;width:18px;height:14px;background:${c.fill};border:2px solid ${c.stroke};vertical-align:middle"></span>`;
  div.innerHTML = `<h4>Legend</h4>
    <div style="font-size:11px;color:#888;margin-bottom:3px">Outage zones (real de-energised area)</div>
    <div class="legend-item">${zoneSwatch(NETWORK_STYLE['Jemena'])} Jemena</div>
    <div class="legend-item">${zoneSwatch(NETWORK_STYLE['CitiPower'])} CitiPower</div>
    <div class="legend-item">${zoneSwatch(NETWORK_STYLE['Powercor'])} Powercor</div>
    <div class="legend-item">${zoneSwatch(NETWORK_STYLE['United Energy'])} United Energy</div>
    <div class="legend-item">${zoneSwatch(NETWORK_STYLE['Ausnet'])} Ausnet</div>
    <div class="legend-item"><span style="display:inline-block;width:18px;height:14px;background:transparent;border:1px dashed #888;vertical-align:middle"></span> Prospect zone — outage, no client yet</div>
    <div class="legend-item"><span style="display:inline-block;width:18px;height:0;border-top:4px solid #ef9a9a;vertical-align:middle"></span> Jemena street shading (context)</div>
    <div class="legend-item"><span style="display:inline-block;width:12px;height:12px;background:#b71c1c;transform:rotate(45deg);border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4)"></span>Client — definitely affected</div>
    <div class="legend-item"><span style="display:inline-block;width:12px;height:12px;background:#fb8c00;transform:rotate(45deg);border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4)"></span>Client — possibly affected (within ${DATA.meta.bufferMetres}m)</div>
    <div class="legend-item"><span style="display:inline-block;width:8px;height:8px;background:#546e7a;transform:rotate(45deg);border:2px solid #fff"></span>Other client (toggle on)</div>
    <div style="font-size:11px;color:#666;margin-top:6px">${esc((DATA.ausnet||[]).filter(o=>o.has_clients!==false&&(o.affected_clients||[]).length>0).length)} zones affecting clients · ${esc((DATA.ausnet||[]).filter(o=>!(o.has_clients!==false&&(o.affected_clients||[]).length>0)).length)} prospect zones</div>
    <div style="font-size:11px;color:#666;margin-top:2px">${esc(DATA.meta.totalClients)} clients tracked · ${esc(DATA.meta.definiteCount)} definite · ${esc(DATA.meta.possibleCount)} possible</div>`;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
