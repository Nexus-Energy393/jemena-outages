// Lead actions → Nexy CRM intake endpoint (dismiss / reviewed / archive).
// Authenticated with the CRM's browser intake key, stored locally after a
// one-time prompt (same UX as the old Pipedrive token).
// ---------------------------------------------------------------------------
const NEXY_KEY_STORAGE = 'nexy-intake-key';
const NEXY_INTAKE_URL = (DATA.meta && DATA.meta.intakeUrl) || 'https://crm.nexusenergy.au/api/intake/outage-lead';

function getNexyKey() {
  let key = localStorage.getItem(NEXY_KEY_STORAGE);
  if (key) return key;
  key = prompt(
    'Nexy intake key needed to update leads from this page.\n\n' +
    'Use the CRM\'s INTAKE_BROWSER_SECRET (ask Justin / see Vercel env).\n\n' +
    'Stored only in your browser. Paste it here:'
  );
  if (key) {
    key = key.trim();
    localStorage.setItem(NEXY_KEY_STORAGE, key);
    return key;
  }
  return null;
}

async function nexyLeadAction(leadId, action) {
  const key = getNexyKey();
  if (!key) throw new Error('No Nexy intake key provided.');
  const res = await fetch(NEXY_INTAKE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-nexy-intake-secret': key },
    body: JSON.stringify({ leadId: String(leadId), action }),
  });
  let body = {};
  try { body = await res.json(); } catch (_e) {}
  if (res.status === 401 || res.status === 403) {
    localStorage.removeItem(NEXY_KEY_STORAGE);
    throw new Error(`HTTP ${res.status} - intake key rejected. Cleared; try again with a fresh key.`);
  }
  if (!res.ok || body.ok === false) {
    throw new Error(`HTTP ${res.status} - ${(body && body.message) || 'action failed'}`);
  }
  return body;
}

tbody.addEventListener('click', async ev => {

    `Tomorrow's run will exclude this client across the whole team.\n\n` +
    `You can undo this in Nexy by setting the lead's status back to New.`

    btn.textContent = 'Hide';
    console.error('[hide] failed:', e);
    alert(`Hide failed:\n\n${String(e.message || e)}\n\n(Open the browser console for more detail.)`);

});

function parseCsvHeaders(text) {
  const firstLine = (text.split(/\r?\n/)[0] || '').trim();
  // Simple CSV split that respects double-quoted fields
  const headers = [];
  let cur = '', inQ = false;
  for (const ch of firstLine) {
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { headers.push(cur.trim()); cur = ''; continue; }
    cur += ch;
  }
  headers.push(cur.trim());
  return headers;
}

function showDiff(oldText, newText) {
  const oldLines = oldText.split(/\r?\n/);
  const newLines = newText.split(/\r?\n/);
  const oldSet = new Set(oldLines);
  const newSet = new Set(newLines);

  let html = '<div class="small" style="margin-top:8px;font-weight:600">Changes:</div><div class="diff-preview">';
  let added = 0, removed = 0;

  for (const line of newLines) {
    if (line && !oldSet.has(line)) {
      html += `<div class="added">+ ${escapeHtml(line)}</div>`;
      added++;
    }
  }
  for (const line of oldLines) {
    if (line && !newSet.has(line)) {
      html += `<div class="removed">- ${escapeHtml(line)}</div>`;
      removed++;
    }
  }
  if (added === 0 && removed === 0) {
    html += '<div class="small">(no changes detected)</div>';
  }
  html += '</div>';
  html = `<div class="small" style="margin-top:8px;font-weight:600">${added} line(s) added, ${removed} removed</div>` + html;
  $preview.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function fetchCurrentCsv() {
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CSV_PATH}`;
  const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' }});
  if (!res.ok) throw new Error(`GitHub fetch failed: ${res.status}`);
  const j = await res.json();
  // content is base64 with line breaks; decode
  const text = atob(j.content.replace(/\n/g, ''));
  return { text, sha: j.sha };
}

$file.addEventListener('change', async () => {
  if (!$file.files.length) return;
  setStatus('', '');
  $confirm.disabled = true;
  try {
    const text = await $file.files[0].text();
    const headers = parseCsvHeaders(text);
    const missing = REQUIRED_HEADERS.filter(h => !headers.includes(h));
    if (missing.length) {
      setStatus('error', `CSV is missing required columns: ${missing.join(', ')}. Header row must include all of: ${REQUIRED_HEADERS.join(', ')}.`);
      return;
    }
    pendingCsvText = text;
    setStatus('working', 'Loading current file from GitHub for diff…');
    try {
      const current = await fetchCurrentCsv();
      showDiff(current.text, text);
      setStatus('', '');
    } catch (e) {
      $preview.innerHTML = `<div class="small" style="margin-top:8px">Could not load current file for diff: ${escapeHtml(e.message)}. You can still upload.</div>`;
      setStatus('', '');
    }
    $confirm.disabled = false;
  } catch (e) {
    setStatus('error', `Could not read file: ${e.message}`);
  }
});

$confirm.addEventListener('click', async () => {
  const token = $token.value.trim();
  if (!token) { setStatus('error', 'Token is required.'); return; }
  if (!pendingCsvText) { setStatus('error', 'Pick a CSV file first.'); return; }

  // Save token for next time
  localStorage.setItem(TOKEN_KEY, token);

  $confirm.disabled = true;
  setStatus('working', 'Fetching current file SHA…');
  let sha;
  try {
    const cur = await fetchCurrentCsv();
    sha = cur.sha;
  } catch (e) {
    setStatus('error', `Could not fetch current file: ${e.message}`);
    $confirm.disabled = false;
    return;
  }

  setStatus('working', 'Pushing to GitHub…');
  // Encode CSV as base64
  const utf8 = new TextEncoder().encode(pendingCsvText);
  let binary = '';
  for (const b of utf8) binary += String.fromCharCode(b);
  const b64 = btoa(binary);

  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CSV_PATH}`;
  try {
    const res = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        message: `Update clients.csv via map UI (${new Date().toISOString()})`,
        content: b64,
        sha,
      }),
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      throw new Error(j.message || `${res.status} ${res.statusText}`);
    }
    setStatus('success', '✓ Pushed. Now trigger the workflow on GitHub Actions, or wait for tomorrow morning.');
    $confirm.textContent = 'Done';
  } catch (e) {
    setStatus('error', `Push failed: ${e.message}`);
    $confirm.disabled = false;
  }
});
