<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Affected clients — Jemena planned outages</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --red:#b71c1c; --orange:#fb8c00; --grey:#9e9e9e; --bg:#fafafa; --border:#e0e0e0; }
  html, body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; background:var(--bg); color:#222; }
  header { background:#fff; border-bottom:1px solid var(--border); padding:14px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
  header h1 { margin:0; font-size:18px; font-weight:600; }
  header .meta { font-size:12px; color:#666; }
  header .actions a { color:#0b57d0; text-decoration:none; margin-left:14px; font-size:13px; font-weight:500; }
  header .actions a:hover { text-decoration:underline; }
  .toolbar { padding:12px 20px; background:#fff; border-bottom:1px solid var(--border); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .toolbar input, .toolbar select { padding:6px 10px; font-size:13px; border:1px solid var(--border); border-radius:4px; background:#fff; }
  .toolbar input { min-width:240px; }
  .toolbar .summary { margin-left:auto; font-size:12px; color:#666; }
  table { width:100%; border-collapse:collapse; background:#fff; }
  thead { position:sticky; top:0; background:#fff; z-index:10; box-shadow:0 1px 0 var(--border); }
  th { text-align:left; padding:10px 14px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:#666; cursor:pointer; user-select:none; white-space:nowrap; }
  th:hover { background:#f5f5f5; }
  th.sort-asc::after { content:' ▲'; color:#999; }
  th.sort-desc::after { content:' ▼'; color:#999; }
  td { padding:10px 14px; border-top:1px solid var(--border); font-size:13px; vertical-align:top; }
  tr:hover td { background:#fafbfc; }
  .chip { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:500; }
  .chip.definite { background:var(--red); color:#fff; }
  .chip.possible { background:var(--orange); color:#fff; }
  .chip.cat { background:#e3f2fd; color:#0d47a1; }
  .chip.cancelled { background:#eee; color:#666; text-decoration:line-through; }
  .small { font-size:11px; color:#777; }
  a { color:#0b57d0; }
  .empty { padding:60px 20px; text-align:center; color:#666; }
  .actions { white-space:nowrap; }
  .btn-sm { display:inline-block; padding:4px 10px; margin-right:4px; border-radius:4px; font-size:11px; font-weight:500; text-decoration:none; background:#f1f3f4; color:#0b57d0; }
  .btn-sm:hover { background:#e8eaed; }
  tr.highlight-flash { animation: flash 1.5s ease-out; }
  @keyframes flash {
    0% { background-color: #fff59d; }
    100% { background-color: transparent; }
  }
  /* Upload modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:none; align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:#fff; padding:24px; border-radius:8px; max-width:560px; width:90%; max-height:85vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
  .modal h2 { margin:0 0 12px; font-size:18px; }
  .modal p { margin:8px 0; font-size:13px; line-height:1.5; color:#333; }
  .modal .small { font-size:11px; color:#777; }
  .modal label { display:block; font-size:12px; font-weight:600; margin:12px 0 4px; }
  .modal input[type="text"], .modal input[type="password"], .modal input[type="file"] {
    width:100%; padding:8px 10px; font-size:13px; border:1px solid var(--border); border-radius:4px; box-sizing:border-box;
  }
  .modal-buttons { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }
  .modal-buttons button { padding:8px 16px; font-size:13px; font-weight:500; border-radius:4px; border:none; cursor:pointer; }
  .modal-buttons .primary { background:#0b57d0; color:#fff; }
  .modal-buttons .primary:disabled { background:#888; cursor:not-allowed; }
  .modal-buttons .secondary { background:#f1f3f4; color:#333; }
  .diff-preview { background:#fafbfc; border:1px solid var(--border); border-radius:4px; padding:10px; margin-top:8px; max-height:200px; overflow-y:auto; font-family:ui-monospace,Menlo,Monaco,monospace; font-size:11px; line-height:1.5; }
  .diff-preview .added { background:#e6f4ea; color:#137333; }
  .diff-preview .removed { background:#fce8e6; color:#c5221f; text-decoration:line-through; }
  .modal .status-line { padding:8px 10px; border-radius:4px; margin-top:8px; font-size:13px; display:none; }
  .modal .status-line.error { background:#fce8e6; color:#c5221f; display:block; }
  .modal .status-line.success { background:#e6f4ea; color:#137333; display:block; }
  .modal .status-line.working { background:#fff8e1; color:#a17900; display:block; }
  @media (max-width: 700px) {
    table, thead, tbody, th, td, tr { display:block; }
    thead { display:none; }
    tr { border:1px solid var(--border); border-radius:6px; margin:10px; padding:8px; background:#fff; }
    td { border:none; padding:4px 8px; }
    td::before { content: attr(data-label) ': '; font-weight:600; font-size:11px; color:#666; display:block; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Affected clients — Jemena planned outages</h1>
    <div class="meta" id="meta"></div>
  </div>
  <div class="actions">
    <a href="index.html">← Back to map</a>
    <a href="affected.csv" download>Download CSV</a>
    <a href="#" id="upload-clients-btn">Upload clients.csv</a>
  </div>
</header>
<div class="toolbar">
  <input id="search" type="search" placeholder="Search client, suburb, street…" autofocus>
  <select id="match-filter">
    <option value="all">All matches</option>
    <option value="definite">Definite only</option>
    <option value="possible">Possible only</option>
  </select>
  <select id="category-filter"><option value="all">All categories</option></select>
  <select id="status-filter">
    <option value="active">Active only (hide cancelled)</option>
    <option value="all">Show cancelled too</option>
  </select>
  <select id="min-hours">
    <option value="0">Any duration</option>
    <option value="2">2+ hrs</option>
    <option value="3">3+ hrs</option>
    <option value="4">4+ hrs</option>
    <option value="6" selected>6+ hrs (generator opportunity)</option>
    <option value="8">8+ hrs</option>
  </select>
  <select id="duration-mode">
    <option value="row" selected>Each outage row</option>
    <option value="longest">Client's longest outage</option>
    <option value="total">Client's total exposure</option>
  </select>
  <select id="group-mode">
    <option value="ungrouped">Ungrouped (one row per outage)</option>
    <option value="client-street" selected>Group: client × street</option>
    <option value="client">Group: client (collapse all)</option>
  </select>
  <div class="summary" id="summary"></div>
</div>
<div id="table-wrap">
  <table id="table">
    <thead>
      <tr>
        <th data-sort="match">Match</th>
        <th data-sort="name">Client</th>
        <th data-sort="category">Category</th>
        <th data-sort="suburb">Suburb</th>
        <th data-sort="address">Address</th>
        <th data-sort="contact">Contact</th>
        <th data-sort="outage_when">When</th>
        <th data-sort="duration">Duration</th>
        <th data-sort="outage_where">Outage location</th>
        <th data-sort="distance">Distance</th>
        <th data-sort="total_hours">Total hrs</th>
        <th data-sort="longest_hours">Longest hrs</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const DATA = {"affected":[],"meta":{"source":"Jemena + Ausnet planned outages \u00b7 auto-updated","extracted":"Thu 30 Apr 2026, 10:22 AM AEST","totalOutages":284,"totalAusnet":148,"totalClients":52,"definiteCount":0,"possibleCount":0,"bufferMetres":200,"defaultMinHours":6.0,"pipedriveDomain":"nexusenergy","repoOwner":"Nexus-Energy393","repoName":"jemena-outages"}};
document.getElementById('meta').textContent =
  `Last updated ${DATA.meta.extracted}. ${DATA.meta.definiteCount} definite, ${DATA.meta.possibleCount} possible. ` +
  `${DATA.meta.totalClients} total clients tracked. Default minimum duration: ${DATA.meta.defaultMinHours||4}h.`;

function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Flatten: one row per (client, outage)
const rows = [];
for (const a of DATA.affected) {
  const c = a.client;
  const total = a.total_hours || 0;
  const longest = a.longest_hours || 0;
  for (const o of a.definite) {
    rows.push({
      match: 'Definite', sortMatch: 0,
      client: c, outage: o,
      distance: null,
      duration: o.duration_hours || 0,
      total_hours: total,
      longest_hours: longest,
      client_min: c.min_outage_hours,
    });
  }
  for (const o of a.possible) {
    rows.push({
      match: 'Possible', sortMatch: 1,
      client: c, outage: o,
      distance: o._distance_m,
      duration: o.duration_hours || 0,
      total_hours: total,
      longest_hours: longest,
      client_min: c.min_outage_hours,
    });
  }
}

const categories = [...new Set(rows.map(r => r.client.category).filter(Boolean))].sort();
const catFilter = document.getElementById('category-filter');
for (const c of categories) {
  const opt = document.createElement('option');
  opt.value = c; opt.textContent = c;
  catFilter.appendChild(opt);
}

let sortKey = 'outage_when', sortDir = 1;
const search = document.getElementById('search');
const matchFilter = document.getElementById('match-filter');
const statusFilter = document.getElementById('status-filter');
const minHours = document.getElementById('min-hours');
const durationMode = document.getElementById('duration-mode');
const tbody = document.getElementById('tbody');
const summary = document.getElementById('summary');

// Read ?min= from URL if main map passed it through
const urlMin = new URLSearchParams(location.search).get('min');
if (urlMin && [...minHours.options].some(o => o.value === urlMin)) {
  minHours.value = urlMin;
}

function effectiveThreshold(r) {
  // Per-client override beats page-level filter
  if (r.client_min != null) return parseFloat(r.client_min);
  return parseFloat(minHours.value);
}

function sortAndFilter() {
  const q = search.value.trim().toLowerCase();
  const mf = matchFilter.value;
  const cf = catFilter.value;
  const sf = statusFilter.value;
  const mode = durationMode.value;

  let filtered = rows.filter(r => {
    if (mf !== 'all' && r.match.toLowerCase() !== mf) return false;
    if (cf !== 'all' && r.client.category !== cf) return false;
    if (sf === 'active' && r.outage.status === 'Cancelled') return false;
    const th = effectiveThreshold(r);
    if (th > 0) {
      let measure;
      if (mode === 'row') measure = r.duration;
      else if (mode === 'total') measure = r.total_hours;
      else measure = r.longest_hours;
      if (measure < th) return false;
    }
    if (q) {
      const hay = [
        r.client.name, r.client.address, r.client.suburb, r.client.category,
        r.outage.street, r.outage.suburb,
      ].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    let av, bv;
    switch (sortKey) {
      case 'match': av = a.sortMatch; bv = b.sortMatch; break;
      case 'name': av = a.client.name||''; bv = b.client.name||''; break;
      case 'category': av = a.client.category||''; bv = b.client.category||''; break;
      case 'suburb': av = a.client.suburb||''; bv = b.client.suburb||''; break;
      case 'address': av = a.client.address||''; bv = b.client.address||''; break;
      case 'contact': av = a.client.contact_name||a.client.contact_phone||''; bv = b.client.contact_name||b.client.contact_phone||''; break;
      case 'outage_when': av = a.outage.start_iso || a.outage.start || ''; bv = b.outage.start_iso || b.outage.start || ''; break;
      case 'duration': av = a.duration; bv = b.duration; break;
      case 'outage_where': av = `${a.outage.suburb} ${a.outage.street}`; bv = `${b.outage.suburb} ${b.outage.street}`; break;
      case 'distance': av = a.distance===null ? -1 : a.distance; bv = b.distance===null ? -1 : b.distance; break;
      case 'total_hours': av = a.total_hours; bv = b.total_hours; break;
      case 'longest_hours': av = a.longest_hours; bv = b.longest_hours; break;
      default: av=''; bv='';
    }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });

  // Group rows if requested
  const groupMode = document.getElementById('group-mode').value;
  let displayRows = filtered;
  if (groupMode !== 'ungrouped' && filtered.length > 0) {
    const groups = new Map();
    for (const r of filtered) {
      const key = groupMode === 'client'
        ? `${r.client.name}|${r.client.address||''}|${r.client.lat||''},${r.client.lng||''}`
        : `${r.client.name}|${r.client.address||''}|${r.outage.street}|${r.outage.suburb}`;
      if (!groups.has(key)) groups.set(key, { rep: r, items: [], minDistance: r.distance });
      const g = groups.get(key);
      g.items.push(r);
      if (r.distance !== null && (g.minDistance === null || r.distance < g.minDistance)) {
        g.minDistance = r.distance;
        g.rep = r;  // promote closer match as representative
      }
    }
    displayRows = [...groups.values()].map(g => ({ ...g.rep, _group: g.items, _minDistance: g.minDistance }));
    // Re-sort grouped rows
    displayRows.sort((a, b) => {
      const av = sortKey === 'duration' ? Math.max(...a._group.map(x => x.duration))
              : sortKey === 'outage_when' ? (a._group.map(x => x.outage.start_iso || x.outage.start || '').sort()[0] || '')
              : sortKey === 'longest_hours' ? a.longest_hours
              : sortKey === 'total_hours' ? a.total_hours
              : sortKey === 'distance' ? (a._minDistance===null ? -1 : a._minDistance)
              : a[sortKey] || a.client[sortKey] || '';
      const bv = sortKey === 'duration' ? Math.max(...b._group.map(x => x.duration))
              : sortKey === 'outage_when' ? (b._group.map(x => x.outage.start_iso || x.outage.start || '').sort()[0] || '')
              : sortKey === 'longest_hours' ? b.longest_hours
              : sortKey === 'total_hours' ? b.total_hours
              : sortKey === 'distance' ? (b._minDistance===null ? -1 : b._minDistance)
              : b[sortKey] || b.client[sortKey] || '';
      if (av < bv) return -sortDir;
      if (av > bv) return sortDir;
      return 0;
    });
  }

  if (displayRows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="12" class="empty">No matching rows. Try clearing filters or lowering the minimum duration.</td></tr>`;
  } else {
    tbody.innerHTML = displayRows.map(r => {
      const c = r.client, o = r.outage;
      const matchChip = `<span class="chip ${r.match.toLowerCase()}">${r.match}</span>`;
      const contactBits = [];
      if (c.contact_name) contactBits.push(esc(c.contact_name));
      if (c.contact_phone) contactBits.push(`<a href="tel:${esc(c.contact_phone)}">${esc(c.contact_phone)}</a>`);
      if (c.contact_email) contactBits.push(`<a href="mailto:${esc(c.contact_email)}">${esc(c.contact_email)}</a>`);
      const overrideTag = c.min_outage_hours != null
        ? `<span class="small">(client threshold ${c.min_outage_hours}h)</span>` : '';

      let whenCell, durCell, locCell, distCell;
      if (r._group) {
        // Sort group items chronologically so 'When' lists soonest first
        const items = [...r._group].sort((x, y) =>
          (x.outage.start_iso || x.outage.start || '').localeCompare(y.outage.start_iso || y.outage.start || '')
        );
        const distinctLocations = [...new Set(items.map(x => `${x.outage.street}|${x.outage.suburb}`))];
        // When: stack each window
        whenCell = items.map(x => {
          const cancelled = x.outage.status === 'Cancelled' ? ' <span class="chip cancelled">cancelled</span>' : '';
          return `<div>${esc(x.outage.start)} – ${esc(x.outage.end)} <span class="small">(${x.duration.toFixed(1)}h)</span>${cancelled}</div>`;
        }).join('');
        const totalGroupHours = items.reduce((acc, x) => acc + (x.outage.status === 'Cancelled' ? 0 : x.duration), 0);
        const longestGroupHours = Math.max(...items.map(x => x.duration));
        durCell = `<div><strong>${longestGroupHours.toFixed(1)}h</strong> longest</div><div class="small">${totalGroupHours.toFixed(1)}h across ${items.length}</div>`;
        // Location: prefer single shared location, else list
        if (distinctLocations.length === 1) {
          locCell = `${esc(o.street)}<div class="small">${esc(o.suburb)}</div>`;
        } else {
          locCell = distinctLocations.map(loc => {
            const [st, sub] = loc.split('|');
            return `<div>${esc(st)} <span class="small">${esc(sub)}</span></div>`;
          }).join('');
        }
        distCell = r._minDistance !== null
          ? `${r._minDistance}m <span class="small">closest</span>`
          : '<span class="small">on street</span>';
      } else {
        const cancelledChip = o.status === 'Cancelled' ? '<span class="chip cancelled">cancelled</span>' : '';
        whenCell = `${esc(o.start)} – ${esc(o.end)} ${cancelledChip}`;
        durCell = `${r.duration.toFixed(1)}h`;
        locCell = `${esc(o.street)}<div class="small">${esc(o.suburb)}</div>`;
        distCell = r.distance !== null ? `${r.distance}m` : '<span class="small">on street</span>';
      }

      const cid = c.client_id || '';
      const pdDomain = (DATA.meta && DATA.meta.pipedriveDomain) || 'nexusenergy';
      const leadId = c.pipedrive_lead_id || '';
      const pipedriveUrl = leadId
        ? `https://${pdDomain}.pipedrive.com/leads/inbox/${leadId}`
        : null;
      const actionsCell = `
        ${cid ? `<a class="btn-sm" href="index.html?focus=${esc(cid)}">Map</a>` : ''}
        ${pipedriveUrl ? `<a class="btn-sm" href="${pipedriveUrl}" target="_blank" rel="noopener">Pipedrive</a>` : ''}
      `;

      return `<tr${cid ? ` id="client-${esc(cid)}"` : ''}>
        <td data-label="Match">${matchChip}</td>
        <td data-label="Client"><strong>${esc(c.name)}</strong>${c.notes?`<div class="small">${esc(c.notes)}</div>`:''}</td>
        <td data-label="Category">${c.category?`<span class="chip cat">${esc(c.category)}</span>`:''}<div class="small">${esc(c.source||'')}</div></td>
        <td data-label="Suburb">${esc(c.suburb||'')}<div class="small">${esc(c.postcode||'')}</div></td>
        <td data-label="Address">${esc(c.address||'')}</td>
        <td data-label="Contact">${contactBits.join('<br>')||'<span class="small">—</span>'}</td>
        <td data-label="When">${whenCell}</td>
        <td data-label="Duration">${durCell}</td>
        <td data-label="Outage location">${locCell}</td>
        <td data-label="Distance">${distCell}</td>
        <td data-label="Total hrs">${r.total_hours.toFixed(1)}h ${overrideTag}</td>
        <td data-label="Longest hrs">${r.longest_hours.toFixed(1)}h</td>
        <td data-label="Actions" class="actions">${actionsCell}</td>
      </tr>`;
    }).join('');
  }
  // Distinct affected clients in current view
  const distinctClients = new Set(filtered.map(r => r.client.name + '|' + (r.client.address||'')));
  const rowLabel = displayRows.length === 1 ? 'row' : 'rows';
  summary.textContent = `${displayRows.length} ${rowLabel}` +
    (groupMode !== 'ungrouped' ? ` (from ${filtered.length} outages)` : '') +
    ` · ${distinctClients.size} client${distinctClients.size===1?'':'s'}`;
}

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (sortKey === k) sortDir = -sortDir;
    else { sortKey = k; sortDir = 1; }
    document.querySelectorAll('th').forEach(x => x.classList.remove('sort-asc', 'sort-desc'));
    th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    sortAndFilter();
  });
});

[search, matchFilter, catFilter, statusFilter, minHours, durationMode,
 document.getElementById('group-mode')].forEach(el =>
  el.addEventListener('input', sortAndFilter)
);

sortAndFilter();

// Honour #client-<id> hash by scrolling to and flashing the matching row.
function focusFromHash() {
  if (!location.hash || !location.hash.startsWith('#client-')) return;
  // Wait one tick to ensure the table is rendered
  setTimeout(() => {
    const target = document.querySelector(location.hash);
    if (!target) return;
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    target.classList.add('highlight-flash');
  }, 50);
}
focusFromHash();
window.addEventListener('hashchange', focusFromHash);

// ---------------------------------------------------------------------------
// Upload clients.csv → push to GitHub via API
// ---------------------------------------------------------------------------
const REPO_OWNER = (DATA.meta && DATA.meta.repoOwner) || 'Nexus-Energy393';
const REPO_NAME  = (DATA.meta && DATA.meta.repoName)  || 'jemena-outages';
const CSV_PATH = 'clients.csv';
const TOKEN_KEY = 'jemena-outages-gh-token';

const REQUIRED_HEADERS = [
  'name','address','suburb','postcode','category',
  'contact_name','contact_phone','contact_email','min_outage_hours','notes'
];

const uploadModal = document.createElement('div');
uploadModal.className = 'modal-overlay';
uploadModal.innerHTML = `
<div class="modal">
  <h2>Upload <code>clients.csv</code></h2>
  <p>This will replace the file in the GitHub repo. The next workflow run (within 24 hours, or trigger manually) will use the new list.</p>

  <label for="upload-token">GitHub Personal Access Token</label>
  <input id="upload-token" type="password" placeholder="github_pat_... or ghp_..." autocomplete="off">
  <p class="small">
    Stored locally in your browser only. Needs repo write access.
    <a href="https://github.com/settings/tokens/new?description=Jemena%20outage%20map&scopes=repo" target="_blank" rel="noopener">Create one</a>
    (tick "repo" scope, give it a sensible expiry).
  </p>

  <label for="upload-file">New <code>clients.csv</code></label>
  <input id="upload-file" type="file" accept=".csv,text/csv">

  <div id="upload-preview"></div>
  <div id="upload-status" class="status-line"></div>

  <div class="modal-buttons">
    <button class="secondary" id="upload-cancel">Cancel</button>
    <button class="primary" id="upload-confirm" disabled>Push to GitHub</button>
  </div>
</div>`;
document.body.appendChild(uploadModal);

const $token = uploadModal.querySelector('#upload-token');
const $file = uploadModal.querySelector('#upload-file');
const $preview = uploadModal.querySelector('#upload-preview');
const $status = uploadModal.querySelector('#upload-status');
const $confirm = uploadModal.querySelector('#upload-confirm');
const $cancel = uploadModal.querySelector('#upload-cancel');

// Restore saved token
$token.value = localStorage.getItem(TOKEN_KEY) || '';

let pendingCsvText = null;

function setStatus(kind, text) {
  $status.className = 'status-line ' + (kind || '');
  $status.textContent = text;
  if (!text) $status.style.display = 'none';
}

function openModal() {
  uploadModal.classList.add('show');
  $token.value = localStorage.getItem(TOKEN_KEY) || '';
  $file.value = '';
  $preview.innerHTML = '';
  setStatus('', '');
  pendingCsvText = null;
  $confirm.disabled = true;
}
function closeModal() { uploadModal.classList.remove('show'); }

document.getElementById('upload-clients-btn').addEventListener('click', e => {
  e.preventDefault();
  openModal();
});
$cancel.addEventListener('click', closeModal);
uploadModal.addEventListener('click', e => { if (e.target === uploadModal) closeModal(); });

function parseCsvHeaders(text) {
  const firstLine = (text.split(/\r?\n/)[0] || '').trim();
  // Simple CSV split that respects double-quoted fields
  const headers = [];
  let cur = '', inQ = false;
  for (const ch of firstLine) {
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { headers.push(cur.trim()); cur = ''; continue; }
    cur += ch;
  }
  headers.push(cur.trim());
  return headers;
}

function showDiff(oldText, newText) {
  const oldLines = oldText.split(/\r?\n/);
  const newLines = newText.split(/\r?\n/);
  const oldSet = new Set(oldLines);
  const newSet = new Set(newLines);

  let html = '<div class="small" style="margin-top:8px;font-weight:600">Changes:</div><div class="diff-preview">';
  let added = 0, removed = 0;

  for (const line of newLines) {
    if (line && !oldSet.has(line)) {
      html += `<div class="added">+ ${escapeHtml(line)}</div>`;
      added++;
    }
  }
  for (const line of oldLines) {
    if (line && !newSet.has(line)) {
      html += `<div class="removed">- ${escapeHtml(line)}</div>`;
      removed++;
    }
  }
  if (added === 0 && removed === 0) {
    html += '<div class="small">(no changes detected)</div>';
  }
  html += '</div>';
  html = `<div class="small" style="margin-top:8px;font-weight:600">${added} line(s) added, ${removed} removed</div>` + html;
  $preview.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function fetchCurrentCsv() {
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CSV_PATH}`;
  const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' }});
  if (!res.ok) throw new Error(`GitHub fetch failed: ${res.status}`);
  const j = await res.json();
  // content is base64 with line breaks; decode
  const text = atob(j.content.replace(/\n/g, ''));
  return { text, sha: j.sha };
}

$file.addEventListener('change', async () => {
  if (!$file.files.length) return;
  setStatus('', '');
  $confirm.disabled = true;
  try {
    const text = await $file.files[0].text();
    const headers = parseCsvHeaders(text);
    const missing = REQUIRED_HEADERS.filter(h => !headers.includes(h));
    if (missing.length) {
      setStatus('error', `CSV is missing required columns: ${missing.join(', ')}. Header row must include all of: ${REQUIRED_HEADERS.join(', ')}.`);
      return;
    }
    pendingCsvText = text;
    setStatus('working', 'Loading current file from GitHub for diff…');
    try {
      const current = await fetchCurrentCsv();
      showDiff(current.text, text);
      setStatus('', '');
    } catch (e) {
      $preview.innerHTML = `<div class="small" style="margin-top:8px">Could not load current file for diff: ${escapeHtml(e.message)}. You can still upload.</div>`;
      setStatus('', '');
    }
    $confirm.disabled = false;
  } catch (e) {
    setStatus('error', `Could not read file: ${e.message}`);
  }
});

$confirm.addEventListener('click', async () => {
  const token = $token.value.trim();
  if (!token) { setStatus('error', 'Token is required.'); return; }
  if (!pendingCsvText) { setStatus('error', 'Pick a CSV file first.'); return; }

  // Save token for next time
  localStorage.setItem(TOKEN_KEY, token);

  $confirm.disabled = true;
  setStatus('working', 'Fetching current file SHA…');
  let sha;
  try {
    const cur = await fetchCurrentCsv();
    sha = cur.sha;
  } catch (e) {
    setStatus('error', `Could not fetch current file: ${e.message}`);
    $confirm.disabled = false;
    return;
  }

  setStatus('working', 'Pushing to GitHub…');
  // Encode CSV as base64
  const utf8 = new TextEncoder().encode(pendingCsvText);
  let binary = '';
  for (const b of utf8) binary += String.fromCharCode(b);
  const b64 = btoa(binary);

  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CSV_PATH}`;
  try {
    const res = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        message: `Update clients.csv via map UI (${new Date().toISOString()})`,
        content: b64,
        sha,
      }),
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      throw new Error(j.message || `${res.status} ${res.statusText}`);
    }
    setStatus('success', '✓ Pushed. Now trigger the workflow on GitHub Actions, or wait for tomorrow morning.');
    $confirm.textContent = 'Done';
  } catch (e) {
    setStatus('error', `Push failed: ${e.message}`);
    $confirm.disabled = false;
  }
});
</script>
</body>
</html>
