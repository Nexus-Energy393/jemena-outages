<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Jemena planned outages — affected streets &amp; clients</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  html, body { margin:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; color:#222; }
  #map { position:absolute; inset:0; }
  .info-box { background:#fff; padding:10px 14px; border-radius:6px; box-shadow:0 1px 6px rgba(0,0,0,.25); font-size:13px; line-height:1.45; max-width:280px; }
  .info-box h4 { margin:0 0 6px; font-size:14px; font-weight:600; }
  .legend-item { display:flex; align-items:center; gap:8px; margin:4px 0; }
  .legend-swatch { width:20px; height:4px; border-radius:2px; }
  .legend-dot { width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.2); }
  .leaflet-popup-content { margin:10px 14px; font-size:13px; line-height:1.5; max-width:340px; }
  .leaflet-popup-content h3 { margin:0 0 6px; font-size:14px; }
  .leaflet-popup-content h4 { margin:10px 0 4px; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#666; }
  .leaflet-popup-content .outage { margin:2px 0 2px 2px; font-size:12px; }
  .leaflet-popup-content .outage.cancelled { color:#aaa; text-decoration:line-through; }
  .leaflet-popup-content .street-block { margin-top:6px; }
  .leaflet-popup-content .street-block .street-name { font-weight:500; font-size:12px; }
  .leaflet-popup-content .street-block .no-geom { font-size:10px; color:#999; }
  .chip { display:inline-block; padding:1px 7px; border-radius:10px; font-size:11px; font-weight:500; margin-right:4px; }
  .chip.planned { background:#ffebee; color:#b71c1c; }
  .chip.cancelled { background:#eee; color:#666; }
  .chip.definite { background:#b71c1c; color:#fff; }
  .chip.possible { background:#fb8c00; color:#fff; }
  .chip.cat { background:#e3f2fd; color:#0d47a1; }
  .leaflet-container a { color:#0b57d0; }
  .popup-actions { display:flex; gap:6px; margin-top:10px; padding-top:8px; border-top:1px solid #eee; }
  .popup-actions a { flex:1; text-align:center; padding:6px 8px; border-radius:4px; font-size:12px; font-weight:500; text-decoration:none; }
  .popup-actions a.btn-primary { background:#0b57d0; color:#fff; }
  .popup-actions a.btn-secondary { background:#f1f3f4; color:#0b57d0; }
  .popup-actions a:hover { opacity:0.85; }
  #header-bar { position:absolute; top:12px; left:12px; right:12px; z-index:1000; pointer-events:none; display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
  #header-bar > * { pointer-events:auto; }
  #updated { background:#fff; padding:6px 10px; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.15); font-size:11px; color:#555; }
  #updated strong { color:#222; }
  .top-buttons { display:flex; gap:8px; flex-wrap:wrap; }
  .top-buttons a, .top-buttons label { background:#fff; padding:8px 14px; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.15); font-size:13px; color:#0b57d0; text-decoration:none; font-weight:500; display:inline-flex; align-items:center; gap:6px; }
  .top-buttons a:hover, .top-buttons label:hover { background:#f5f5f5; }
  .top-buttons a.alert { background:#b71c1c; color:#fff; }
  .top-buttons a.alert:hover { background:#8b0000; }
  .top-buttons select { border:none; background:transparent; font-size:13px; font-weight:500; color:#0b57d0; cursor:pointer; }
  .top-buttons label { color:#333; }
</style>
</head>
<body>
<div id="map"></div>
<div id="header-bar">
  <div id="updated">Updated: <strong id="updated-value">…</strong></div>
  <div class="top-buttons">
    <label>Min duration:
      <select id="min-hours-select">
        <option value="0">Any</option>
        <option value="2">2+ hrs</option>
        <option value="3">3+ hrs</option>
        <option value="4" selected>4+ hrs (default)</option>
        <option value="6">6+ hrs</option>
        <option value="8">8+ hrs</option>
      </select>
    </label>
    <a id="affected-link" class="alert" href="affected.html">Affected clients</a>
    <a href="affected.csv" download>CSV</a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const DATA = __DATA__;
const MATCHED = new Set(DATA.matchedPairs);

document.getElementById('updated-value').textContent = DATA.meta.extracted;

const map = L.map('map', { preferCanvas: true }).setView([-37.74, 144.88], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, subdomains: 'abcd',
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a> | Outage data &copy; Jemena'
}).addTo(map);

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function norm(s) { return String(s || '').toLowerCase().replace(/\s+/g, ' ').trim(); }

function buildSuburbPopup(s) {
  const byStreet = {};
  for (const o of DATA.outages.filter(o => o.suburb === s.name)) (byStreet[o.street] ||= []).push(o);
  const streetHtml = Object.keys(byStreet).sort().map(street => {
    const key = s.name.toLowerCase() + '||' + norm(street);
    const hasGeom = MATCHED.has(key);
    const list = byStreet[street].map(o => {
      const c = o.status === 'Cancelled';
      return `<div class="outage ${c?'cancelled':''}">${esc(o.start)} – ${esc(o.end)}${c?' <span class="chip cancelled">cancelled</span>':''}</div>`;
    }).join('');
    return `<div class="street-block"><div class="street-name">${esc(street)}${hasGeom?'':' <span class="no-geom">(not on map)</span>'}</div>${list}</div>`;
  }).join('');
  return `<div><h3>${esc(s.name)}</h3>
    <div><span class="chip planned">${s.planned} planned</span>
    ${s.cancelled ? `<span class="chip cancelled">${s.cancelled} cancelled</span>` : ''}
    <span style="font-size:12px;color:#666"> · ${s.streets.length} streets</span></div>
    <h4>Outages by street</h4>${streetHtml}</div>`;
}

function buildStreetPopup(suburbName, streetName, outages) {
  const items = outages.map(o => {
    const c = o.status === 'Cancelled';
    return `<div class="outage ${c?'cancelled':''}">${esc(o.start)} – ${esc(o.end)}${c?' <span class="chip cancelled">cancelled</span>':''}</div>`;
  }).join('');
  return `<div><h3>${esc(streetName)}</h3>
    <div style="font-size:12px;color:#666;margin-bottom:4px">${esc(suburbName)}</div>${items}</div>`;
}

function buildClientPopup(client, affected) {
  let header = `<h3>${esc(client.name)}</h3>`;
  if (client.category) header += `<div><span class="chip cat">${esc(client.category)}</span></div>`;
  let body = '';
  if (client.address) body += `<div style="font-size:12px;color:#666">${esc(client.address)}, ${esc(client.suburb||'')} ${esc(client.postcode||'')}</div>`;
  if (client.contact_name || client.contact_phone || client.contact_email) {
    body += '<h4>Contact</h4>';
    if (client.contact_name) body += `<div>${esc(client.contact_name)}</div>`;
    if (client.contact_phone) body += `<div><a href="tel:${esc(client.contact_phone)}">${esc(client.contact_phone)}</a></div>`;
    if (client.contact_email) body += `<div><a href="mailto:${esc(client.contact_email)}">${esc(client.contact_email)}</a></div>`;
  }
  if (client.notes) body += `<div style="margin-top:6px;font-size:12px">${esc(client.notes)}</div>`;
  if (affected) {
    const tH = (affected.total_hours||0).toFixed(1);
    const lH = (affected.longest_hours||0).toFixed(1);
    body += `<h4>Outage exposure</h4>
      <div style="font-size:12px">Longest single: <strong>${lH}h</strong> · Total across all: <strong>${tH}h</strong></div>`;
    if (affected.definite.length) {
      body += `<h4><span class="chip definite">Definitely affected</span></h4>`;
      body += affected.definite.map(o =>
        `<div class="outage">${esc(o.start)} – ${esc(o.end)} (${(o.duration_hours||0).toFixed(1)}h) · ${esc(o.street)} ${esc(o.suburb)}${o.status==='Cancelled'?' <span class="chip cancelled">cancelled</span>':''}</div>`
      ).join('');
    }
    if (affected.possible.length) {
      body += `<h4><span class="chip possible">Possibly affected</span> <span style="font-weight:normal;color:#666">(within ${DATA.meta.bufferMetres}m)</span></h4>`;
      body += affected.possible.map(o =>
        `<div class="outage">${esc(o.start)} – ${esc(o.end)} (${(o.duration_hours||0).toFixed(1)}h) · ${esc(o.street)} ${esc(o.suburb)} <span style="color:#999">(${o._distance_m||'?'}m)</span></div>`
      ).join('');
    }
    // Action buttons
    const cid = client.client_id || '';
    const pdDomain = (DATA.meta && DATA.meta.pipedriveDomain) || 'nexusenergy';
    const titleSearch = encodeURIComponent(client.name + ' Planned Power Outage');
    body += `<div class="popup-actions">`;
    if (cid) {
      body += `<a class="btn-secondary" href="affected.html#client-${esc(cid)}">View on list</a>`;
    }
    body += `<a class="btn-primary" href="https://${esc(pdDomain)}.pipedrive.com/leads/list?search=${titleSearch}" target="_blank" rel="noopener">Open in Pipedrive</a>`;
    body += `</div>`;
  }
  return `<div>${header}${body}</div>`;
}

const suburbIcon = L.divIcon({ className:'', html:'<div style="width:14px;height:14px;border-radius:50%;background:#1565c0;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.35)"></div>', iconSize:[14,14], iconAnchor:[7,7] });
const suburbIconCancelled = L.divIcon({ className:'', html:'<div style="width:14px;height:14px;border-radius:50%;background:#f9a825;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.35)"></div>', iconSize:[14,14], iconAnchor:[7,7] });

function clientIcon(state) {
  // state: 'definite' | 'possible' | 'unaffected'
  const colors = { definite: '#b71c1c', possible: '#fb8c00', unaffected: '#546e7a' };
  const size = state === 'unaffected' ? 8 : 12;
  return L.divIcon({ className:'', html:`<div style="width:${size}px;height:${size}px;background:${colors[state]};border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4); transform: rotate(45deg);"></div>`, iconSize:[size+4,size+4], iconAnchor:[(size+4)/2,(size+4)/2] });
}

const streetLayer = L.layerGroup();
for (const s of DATA.streets) {
  L.polyline(s.coords, {
    color: s.cancelled ? '#9e9e9e' : '#e53935',
    weight: 6, opacity: 0.85, lineJoin: 'round', lineCap: 'round',
  }).bindPopup(buildStreetPopup(s.suburb, s.name, s.outages))
    .addTo(streetLayer);
}
streetLayer.addTo(map);

const suburbLayer = L.layerGroup();
DATA.suburbs.forEach(s => {
  L.marker([s.lat, s.lng], { icon: s.cancelled>0 ? suburbIconCancelled : suburbIcon, title: s.name })
   .bindPopup(buildSuburbPopup(s), { maxHeight: 380 }).addTo(suburbLayer);
});
suburbLayer.addTo(map);

// Map clients to their affected entry, if any
const affectedByName = new Map();
for (const a of (DATA.affected || [])) {
  const k = a.client.name + '|' + (a.client.address||'') + '|' + (a.client.lat||'') + ',' + (a.client.lng||'');
  affectedByName.set(k, a);
}

const affectedLayer = L.layerGroup();
const clientLayer = L.layerGroup();
const markersByClientId = new Map();

function clientMeetsThreshold(a, defaultMin) {
  if (!a) return false;
  const min = (a.client && a.client.min_outage_hours != null) ? a.client.min_outage_hours : defaultMin;
  return (a.longest_hours || 0) >= min;
}

function redrawClientLayers() {
  affectedLayer.clearLayers();
  clientLayer.clearLayers();
  markersByClientId.clear();
  const minSel = parseFloat(document.getElementById('min-hours-select').value);
  let visibleAffected = 0, visibleDefinite = 0, visiblePossible = 0;

  for (const c of (DATA.clients || [])) {
    const key = c.name + '|' + (c.address||'') + '|' + (c.lat||'') + ',' + (c.lng||'');
    const a = affectedByName.get(key);
    let state = 'unaffected', layer = clientLayer;
    if (a) {
      // Apply per-client override or page-level filter
      const clientMin = (c.min_outage_hours != null) ? c.min_outage_hours : minSel;
      if ((a.longest_hours || 0) < clientMin) {
        state = 'unaffected';
        layer = clientLayer;
      } else {
        state = a.definite.length ? 'definite' : 'possible';
        layer = affectedLayer;
        visibleAffected++;
        if (state === 'definite') visibleDefinite++; else visiblePossible++;
      }
    }
    const m = L.marker([c.lat, c.lng], { icon: clientIcon(state), title: c.name })
                .bindPopup(buildClientPopup(c, a), { maxHeight: 380 })
                .addTo(layer);
    if (c.client_id) markersByClientId.set(c.client_id, { marker: m, layer });
  }
  document.getElementById('affected-link').textContent = visibleAffected
    ? `${visibleAffected} affected clients`
    : 'Affected clients (0)';
  return { visibleAffected, visibleDefinite, visiblePossible };
}

// Initial selection from default
const defaultMin = (DATA.meta && DATA.meta.defaultMinHours) || 4;
document.getElementById('min-hours-select').value = String(defaultMin);

redrawClientLayers();
affectedLayer.addTo(map);  // affected on by default

// Honour ?focus=<client-id> in URL - centre map on that pin and open popup
function focusClientFromUrl() {
  const params = new URLSearchParams(location.search);
  const focusId = params.get('focus');
  if (!focusId) return;
  const entry = markersByClientId.get(focusId);
  if (!entry) {
    console.warn('Could not find client', focusId, '- it may not be affected today');
    return;
  }
  // Make sure the layer is on the map so the marker is visible
  if (!map.hasLayer(entry.layer)) entry.layer.addTo(map);
  map.setView(entry.marker.getLatLng(), 16, { animate: true });
  setTimeout(() => entry.marker.openPopup(), 400);
}
focusClientFromUrl();

// Update on threshold change; also pass through to affected.html via querystring
document.getElementById('min-hours-select').addEventListener('change', e => {
  redrawClientLayers();
  const link = document.getElementById('affected-link');
  link.href = `affected.html?min=${encodeURIComponent(e.target.value)}`;
});

if (DATA.suburbs.length) map.fitBounds(L.latLngBounds(DATA.suburbs.map(s => [s.lat, s.lng])).pad(0.15));

L.control.layers(null, {
  'Affected streets': streetLayer,
  'Suburb markers': suburbLayer,
  'Affected clients': affectedLayer,
  'All clients (incl. unaffected)': clientLayer,
}, { collapsed: false }).addTo(map);

const legend = L.control({ position:'bottomright' });
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'info-box');
  const unmapped = DATA.suburbs.reduce((a, s) => a + s.streets.filter(st => !MATCHED.has(s.name.toLowerCase() + '||' + norm(st))).length, 0);
  div.innerHTML = `<h4>Legend</h4>
    <div class="legend-item"><span class="legend-swatch" style="background:#e53935"></span>Street with planned outage</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#9e9e9e"></span>Only cancelled outages</div>
    <div class="legend-item"><span class="legend-dot" style="background:#1565c0"></span>Suburb (click for details)</div>
    <div class="legend-item"><span class="legend-dot" style="background:#f9a825"></span>Suburb with cancellations</div>
    <div class="legend-item"><span style="display:inline-block;width:12px;height:12px;background:#b71c1c;transform:rotate(45deg);border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4)"></span>Client — definitely affected</div>
    <div class="legend-item"><span style="display:inline-block;width:12px;height:12px;background:#fb8c00;transform:rotate(45deg);border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4)"></span>Client — possibly affected (within ${DATA.meta.bufferMetres}m)</div>
    <div class="legend-item"><span style="display:inline-block;width:8px;height:8px;background:#546e7a;transform:rotate(45deg);border:2px solid #fff"></span>Other client (toggle on)</div>
    <div style="font-size:11px;color:#666;margin-top:6px">${esc(DATA.streets.length)} street segments shaded · ${unmapped} streets in popup only</div>
    <div style="font-size:11px;color:#666;margin-top:2px">${esc(DATA.meta.totalClients)} clients tracked · ${esc(DATA.meta.definiteCount)} definite · ${esc(DATA.meta.possibleCount)} possible</div>`;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
