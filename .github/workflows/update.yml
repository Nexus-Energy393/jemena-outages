name: Update Jemena outages map

on:
  schedule:
    # 20:00 UTC = 06:00 AEST (Melbourne, non-daylight-saving).
    # During daylight saving (Oct-Apr) this runs at 07:00 AEDT. If that bothers you,
    # change to '0 19 * * *' for 06:00 AEDT / 05:00 AEST.
    - cron: '0 20 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-map
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run scraper and rebuild map
        run: python scrape.py

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ .cache/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update outage data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi
