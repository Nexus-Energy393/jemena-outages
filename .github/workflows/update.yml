name: Update Jemena outages map

on:
  schedule:
    # 20:00 UTC = 06:00 AEST / 07:00 AEDT. Change to '0 19 * * *' if you'd
    # rather get 06:00 AEDT / 05:00 AEST.
    - cron: '0 20 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-map
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run scraper and rebuild map
        id: scrape
        continue-on-error: true
        run: python scrape.py

      - name: Commit updated docs and cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ .cache/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            if [ "${{ steps.scrape.outcome }}" = "success" ]; then
              git commit -m "Update outage data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            else
              git commit -m "Scrape failed, saving debug files ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            fi
            git push
          fi

      - name: Fail the run if the scrape itself failed
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "::error::Scrape step failed. See docs/_last_scrape.png and docs/_last_scrape_raw.json."
          exit 1
