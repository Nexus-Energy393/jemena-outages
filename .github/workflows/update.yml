name: Update Jemena outages map

on:
  schedule:
    # Hourly through the Melbourne business day: 7 am – 6 pm AEST
    # (= 21:00–08:00 UTC; during daylight saving this shifts to 8 am – 7 pm).
    - cron: '0 21-23,0-8 * * *'
  workflow_dispatch:
    inputs:
      is_retry:
        description: "Set to true when this run is a 15-min retry; prevents further retries"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: update-map
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # 25 min: normal runs take ~5, but a geocode-budget run (200 new client
    # lookups after a bulk clients.csv addition) can legitimately need ~15.
    # A cancelled run commits nothing, so the timeout must never be the norm.
    timeout-minutes: 25
    outputs:
      scrape_failed: ${{ steps.scrape.outcome == 'failure' && '1' || '0' }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Playwright no longer needed: Jemena's outage data now comes straight
      # from the poweroutages.jemena.com.au JSON feed (no browser, no DOM).

      - name: Run scraper and rebuild map
        id: scrape
        continue-on-error: true
        env:
          # Nexy CRM leads sink (replaces the retired Pipedrive integration)
          NEXY_INTAKE_SECRET: ${{ secrets.NEXY_INTAKE_SECRET }}
          NEXY_INTAKE_URL: ${{ vars.NEXY_INTAKE_URL || 'https://crm.nexusenergy.au/api/intake/outage-lead' }}
          NEXY_DRY_RUN: ${{ vars.NEXY_DRY_RUN || 'false' }}
          NEXY_MIN_HOURS: ${{ vars.NEXY_MIN_HOURS || '6' }}
          NEXY_MAX_DAYS_AHEAD: ${{ vars.NEXY_MAX_DAYS_AHEAD || '21' }}
          CRM_BASE_URL: ${{ vars.CRM_BASE_URL || 'https://crm.nexusenergy.au' }}
          MAP_BASE_URL: ${{ vars.MAP_BASE_URL || 'https://outages.nexusenergy.au' }}
        run: python scrape.py

      - name: Commit updated docs and cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ .cache/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          if [ "${{ steps.scrape.outcome }}" = "success" ]; then
            COMMIT_MSG="Update outage data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          else
            COMMIT_MSG="Scrape failed, saving debug files ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          fi
          git commit -m "$COMMIT_MSG"
          # Push with retries — if remote moved during the run, rebase and try again
          for i in 1 2 3; do
            if git push; then
              echo "Pushed successfully on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed; pulling and retrying..."
            git pull --rebase --autostash origin main
          done
          echo "::error::Could not push after 3 attempts"
          exit 1

      - name: Fail the run if the scrape itself failed
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "::error::Scrape step failed. See docs/_last_scrape_raw.json for the raw Jemena feed."
          exit 1

  retry:
    needs: update
    if: ${{ needs.update.outputs.scrape_failed == '1' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.is_retry != 'true')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      actions: write
      contents: read
    steps:
      - name: Wait 15 minutes before retrying
        run: sleep 900

      - name: Check out repo
        uses: actions/checkout@v4

      - name: Re-dispatch update workflow as retry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Re-dispatching update.yml on $GITHUB_REF_NAME as retry"
          gh workflow run update.yml --ref "$GITHUB_REF_NAME" -f is_retry=true
